<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <title>Iniciar Sesión - Soporte Empresarial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

</head>

<body class="auth-body">

<div class="login-wrapper">

    <div class="card shadow-lg login-card">

        <div class="row g-0">

            <!-- ILUSTRACIÓN -->
            <div class="col-md-6 login-illustration"></div>

            <!-- FORMULARIO -->
            <div class="col-md-6 p-4 login-form-side">

                <div class="text-center mb-3">

                    <div class="logo-icon">
                        <i class="bi bi-gear-fill"></i>
                    </div>

                    <h4 class="mt-2 mb-3">
                        Soporte Técnico
                    </h4>

                </div>

                <div id="msg"></div>

                <form method="post" action="/auth/login">

                    <!-- USUARIO -->
                    <div class="mb-3">
                        <div class="input-group">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

                            <input
                                    type="text"
                                    class="form-control"
                                    name="username"
                                    placeholder="Usuario"
                                    required>

                        </div>
                    </div>

                    <!-- CONTRASEÑA -->
                    <div class="mb-3">
                        <div class="input-group">

        <span class="input-group-text">
            <i class="bi bi-lock"></i>
        </span>

                            <input
                                    type="password"
                                    class="form-control"
                                    name="password"
                                    id="passwordField"
                                    placeholder="Contraseña"
                                    required>

                            <span class="input-group-text" id="togglePassword"
                                  style="cursor: pointer; padding-right: 15px;">
            <i class="bi bi-eye-slash" id="eyeIcon" style="color: #6c757d;"></i>
        </span>

                        </div>
                    </div>

                    <button type="submit" class="btn btn-main w-100">
                        Iniciar sesión
                    </button>

                </form>

                <div class="text-center mt-3">

                    <a href="registro.html" class="text-decoration-none text-secondary">
                        Crear cuenta
                    </a>

                </div>

            </div>

        </div>
    </div>

</div>

<div class="footer">
    © 2026 Soporte Empresarial. Todos los derechos reservados.
</div>

<script src="js/app.js"></script>

</body>
</html>
