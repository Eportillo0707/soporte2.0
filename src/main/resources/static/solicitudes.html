<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Solicitud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Soporte Empresarial</a>

    <div>
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link active" href="solicitudes.html">Crear Solicitud</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="mis-solicitudes.html">Mis Solicitudes</a>
        </li>

        <li class="nav-item ms-3">
          <form method="post" action="/auth/logout">
            <button class="btn btn-outline-light btn-sm">Cerrar sesión</button>
          </form>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5 d-flex justify-content-center">

  <div class="card shadow-lg p-4" style="width: 500px;">
    <h4 class="text-center mb-4">Crear Solicitud</h4>

    <div id="mensaje"></div>

    <form id="solicitudForm">

      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" id="descripcion" rows="3" required></textarea>
      </div>

      <button type="submit" class="btn btn-success w-100">
        Crear Solicitud
      </button>

    </form>
  </div>

</div>

<script>
  const form = document.getElementById('solicitudForm');
  const mensajeDiv = document.getElementById('mensaje');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const descripcion = document.getElementById('descripcion').value;

    fetch(`/solicitudes/mia?descripcion=${encodeURIComponent(descripcion)}`, {
      method: 'POST'
    })
    .then(r => r.json())
    .then(data => {
      mensajeDiv.innerHTML = `
        <div class="alert alert-success">
          Solicitud creada exitosamente ✔ <br>
          Estado inicial: ${data.estado}
        </div>
      `;
      form.reset();
    })
    .catch(() => {
      mensajeDiv.innerHTML = `
        <div class="alert alert-danger">
          Error al crear la solicitud
        </div>
      `;
    });
  });
</script>

</body>
</html>
