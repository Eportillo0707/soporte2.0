<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Solicitudes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Soporte Empresarial</a>

    <div>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="solicitudes.html">Crear Solicitud</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="mis-solicitudes.html">Mis Solicitudes</a>
        </li>

        <li class="nav-item ms-3">
          <form method="post" action="/auth/logout">
            <button class="btn btn-outline-light btn-sm">Cerrar sesión</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4 text-center">Mis Solicitudes</h2>

  <div class="card shadow">
    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Estado</th>
        </tr>
        </thead>
        <tbody id="tablaMisSolicitudes"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const tabla = document.getElementById("tablaMisSolicitudes");

  function colorEstado(estado) {
    if (estado === "PENDIENTE") return "bg-warning text-dark";
    if (estado === "EN_PROCESO") return "bg-info text-dark";
    if (estado === "FINALIZADO") return "bg-success";
    return "bg-secondary";
  }

  function cargarMisSolicitudes() {
    fetch("/solicitudes/mias")
      .then(r => r.json())
      .then(data => {
        tabla.innerHTML = "";
        data.forEach(s => {
          const fila = document.createElement("tr");
          fila.innerHTML = `
            <td>${s.id}</td>
            <td>${s.descripcion}</td>
            <td><span class="badge ${colorEstado(s.estado)}">${s.estado}</span></td>
          `;
          tabla.appendChild(fila);
        });
      });
  }

  cargarMisSolicitudes();
</script>

</body>
</html>
