<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Soporte Empresarial</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">

            <div class="card shadow-lg p-4">
                <h4 class="text-center mb-4">Iniciar Sesión</h4>

                <div id="msg"></div>

                <!-- Spring Security procesa este POST -->
                <form method="post" action="/auth/login">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">Ingresar</button>
                </form>

                <div class="text-center mt-3">
                    <a href="registro.html">Crear cuenta</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msg = document.getElementById("msg");

    if (params.get("error") === "true") {
      msg.innerHTML = `<div class="alert alert-danger">Usuario o contraseña incorrectos</div>`;
    }

    if (params.get("logout") === "true") {
      msg.innerHTML = `<div class="alert alert-success">Sesión cerrada correctamente</div>`;
    }
</script>

</body>
</html>
