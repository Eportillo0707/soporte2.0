<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Soporte Empresarial</a>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">

            <div class="card shadow-lg p-4">
                <h4 class="text-center mb-4">Crear Cuenta</h4>

                <div id="mensaje"></div>

                <form id="registroForm">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" id="correo" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" id="telefono">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Crear Cuenta
                    </button>


                    <div class="text-center mt-3">
                        <span>¿Ya tienes una cuenta? </span>
                        <a href="login.html">Iniciar sesión</a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const form = document.getElementById('registroForm');
    const mensajeDiv = document.getElementById('mensaje');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const data = {
        nombre: document.getElementById('nombre').value,
        correo: document.getElementById('correo').value,
        telefono: document.getElementById('telefono').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };

      fetch('/auth/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(async (response) => {
        const text = await response.text();
        if (!response.ok) throw new Error(text || "Error al registrar usuario");
        return text;
      })
      .then(msg => {
        mensajeDiv.innerHTML = `<div class="alert alert-success">${msg} <br>Redirigiendo al login...</div>`;
        form.reset();

        // Redirigir al login después de 2 segundos
        setTimeout(() => {
            window.location.href = "login.html";
        }, 2000);
      })
      .catch(error => {
        mensajeDiv.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
      });
    });
</script>

</body>
</html>
